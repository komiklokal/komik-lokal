server {
    listen 80;
    root /var/www/html;
    index index.php index.html;

    # Charset
    charset utf-8;

    # Routing: coba file langsung, lalu folder, lalu index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Proses file PHP via php-fpm
    # Gunakan regex yang lebih fleksibel agar bisa handle path dengan spasi
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    # Sembunyikan file sensitif
    location ~* \.(sql|env|log)$ {
        deny all;
    }

    # Sembunyikan file dot (seperti .htaccess)
    location ~ /\. {
        deny all;
    }

    # Upload size
    client_max_body_size 50M;
}
